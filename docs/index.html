<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | puzzle-2048</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=480 height=700 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">puzzle-2048</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/docs.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/docs.data",
        frameworkUrl: buildUrl + "/docs.framework.js",
        codeUrl: buildUrl + "/docs.wasm",
        symbolsUrl: buildUrl + "/docs.symbols.json",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "naullama",
        productName: "puzzle-2048",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        errorHandler: function(err, url, line) {
            console.error('[Unity] ' + err + ' at ' + url + ':' + line);
            return false;
        },
        // Unity 公式の WebGL コンテキスト属性指定
        // failIfMajorPerformanceCaveat:false でソフトウェアレンダリング (SwiftShader) を許可
        webglContextAttributes: {
            failIfMajorPerformanceCaveat: false,
            powerPreference: "default",
            preserveDrawingBuffer: false,
            antialias: false,
            alpha: false,
            depth: false,
            stencil: false,
        },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "480px";
        canvas.style.height = "700px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  
    <div id='unity-dbg-overlay' style='position:fixed;top:0;left:0;right:0;
         max-height:40vh;overflow-y:auto;background:rgba(0,0,0,0.85);color:#39ff14;
         font:11px/1.4 monospace;padding:6px 8px;z-index:999999;pointer-events:none;
         white-space:pre-wrap;word-break:break-all;'></div>
    <script>
      // ── WebGL コンテキスト修正 ───────────────────────────────────────────
      // Unity は failIfMajorPerformanceCaveat:true でコンテキストを作成するため
      // ブラウザの GPU 設定によっては Null Device にフォールバックする。
      // false に強制してソフトウェアレンダリング (SwiftShader) も許可する。
      (function() {
        var _orig = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function(type, attrs) {
          if (type === 'webgl2' || type === 'webgl' || type === 'webgl-experimental') {
            attrs = Object.assign({}, attrs || {});
            attrs.failIfMajorPerformanceCaveat = false;
            attrs.powerPreference = attrs.powerPreference || 'default';
          }
          return _orig.call(this, type, attrs);
        };
        console.log('[DBG] WebGL context patch applied (failIfMajorPerformanceCaveat=false)');
      })();

      // ── デバッグオーバーレイ ─────────────────────────────────────────────
      var _dbgHasError = false;
      function dbg(msg, isError) {
        var el = document.getElementById('unity-dbg-overlay');
        if (!el) return;
        if (isError) { _dbgHasError = true; el.style.color = '#ff4444'; }
        var ts = (performance.now()/1000).toFixed(2);
        el.innerHTML += '[' + ts + 's] ' + msg + '\n';
        el.scrollTop = el.scrollHeight;
        console.log('[DBG] ' + msg);
      }
      dbg('JS: ページ読み込み完了');

      // ── WebGL 動作テスト（Unity ロード前に実施） ─────────────────────────
      (function() {
        var tc = document.createElement('canvas');
        var gl2 = tc.getContext('webgl2', {failIfMajorPerformanceCaveat: false});
        if (gl2) {
          dbg('WebGL2 OK: ' + gl2.getParameter(gl2.RENDERER) + ' | ' + gl2.getParameter(gl2.VENDOR));
        } else {
          var gl1 = tc.getContext('webgl', {failIfMajorPerformanceCaveat: false})
                 || tc.getContext('experimental-webgl', {failIfMajorPerformanceCaveat: false});
          if (gl1) {
            dbg('WebGL2 不可 / WebGL1 OK: ' + gl1.getParameter(gl1.RENDERER), true);
          } else {
            dbg('WebGL 完全に使用不可 - ブラウザの設定を確認してください', true);
          }
        }
        dbg('UA: ' + navigator.userAgent.substring(0, 80));
      })();

      // エラーがなければ 3 秒後に自動消去
      setTimeout(function() {
        if (!_dbgHasError) {
          var el = document.getElementById('unity-dbg-overlay');
          if (el) el.style.display = 'none';
        }
      }, 3000);

      window.addEventListener('error', function(e) {
        dbg('JS ERR: ' + e.message + ' (' + (e.filename||'') + ':' + e.lineno + ')', true);
      });
      window.addEventListener('unhandledrejection', function(e) {
        dbg('JS PROMISE ERR: ' + e.reason, true);
      });
    </script>
</body>
</html>
